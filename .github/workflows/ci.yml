name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: Typecheck + build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck and build frontend
        env:
          # Dummy values so the build doesn't warn about missing env vars.
          # The publishable key is safe to ship; CI never talks to a real
          # Supabase project.
          VITE_SUPABASE_URL: https://ci.example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_dummy_value
        run: bun run build

      - name: Run tests
        run: bun run test
